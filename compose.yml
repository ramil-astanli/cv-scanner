services:

  postgres:
    image: postgres:16-alpine
    container_name: cvscanner-db
    environment:
      POSTGRES_DB: cvscanner
      POSTGRES_USER: cvuser
      POSTGRES_PASSWORD: cvpass123
    ports:
      - "5437:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvuser -d cvscanner"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cvscanner-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cvscanner.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres-data: